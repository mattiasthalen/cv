cv:
  name: Mattias Thalén
  headline: Analytics Consultant
  location: Uppsala, Sweden
  email: mattias.thalen@me.com
  photo: mattias_thalen.jpg
  social_networks:
    - network: LinkedIn
      username: mattias-thalén

    - network: GitHub
      username: mattiasthalen

  sections:
    summary:
      - Experienced Analytics Consultant with a strong background in Business Intelligence, Data Engineering, and Analytics Engineering. Proficient in Microsoft Fabric, Qlik Sense, SQLMesh, and dlt, with a proven track record of delivering data-driven solutions that enhance business performance. Skilled in data modeling, ETL processes, and creating self-service analytics platforms. Committed to continuous improvement and leveraging data to drive strategic decision-making.

    open_source_contributions:
      - name: Qlik Parser
        summary: CLI tool written in Go that extracts Qlik scripts from binary files.
        date: 2025
        highlights:
          - Built a CLI tool to parse and extract scripts from Qlik binary formats.
        url: https://github.com/mattiasthalen/qlik-parser

      - name: SQLGlot
        summary: Open-source SQL parser and transpiler.
        date: 2025
        highlights:
          - Added support for Microsoft Fabric SQL dialect.
        url: https://github.com/tobymao/sqlglot

      - name: SQLMesh
        summary: Open-source data transformation and orchestration tool.
        date: 2025
        highlights:
          - Added support for Microsoft Fabric.
        url: https://github.com/TobikoData/sqlmesh

      - name: dltHub
        summary: Open-source data ingestion framework.
        date: 2025
        highlights:
          -  Added support for Microsoft Fabric.
        url: https://github.com/dlt-hub/dlt

    certifications:
      - name: Microsoft Certified - Fabric Data Engineer Associate
        date: 2025-08
        url: https://learn.microsoft.com/api/credentials/share/en-us/mattiasthalen/A2A3A7534C2AA848

      - name: Microsoft Certified - Fabric Analytics Engineer Associate
        date: 2024-09
        url: https://learn.microsoft.com/api/credentials/share/en-us/mattiasthalen/B2D8389746CF89A2

      - name: dbt Developer
        date: 2024-07
        url: https://credentials.getdbt.com/abdeb34d-9514-4e6d-af0a-24d30f3f51e0

      - name: Qlik Sense Business Analyst
        date: 2024-03
        url: https://www.credly.com/badges/8df065ec-b338-4800-bbb7-78375bf685c8

      - name: Qlik Sense Data Architect
        date: 2024-03
        url: https://www.credly.com/badges/a4622c11-aa2b-4916-bb63-98d28384db39

      - name: Microsoft Certified - Azure Data Fundamentals
        date: 2023-02
        url: https://www.credly.com/badges/65afb248-b4d8-4757-8435-35f8a141f32a

    skills:
      - label: Disciplines
        details: Analytics Engineering, Data Engineering, Business Intelligence (BI)
      - label: Methodologies
        details: Data Modeling, Data Warehousing, ETL/ELT, Unified Star Schema, Medallion Architecture, Hook Methodology
      - label: Languages
        details: Python, SQL
      - label: Technologies
        details: Microsoft Fabric, Qlik Sense, dbt, SQLMesh, dlt

    projects:
      - title: Avarn Security — Qlik to Fabric Migration
        date: 2026
        authors:
          - Microsoft Fabric
          - dlt
          - SQLMesh
        summary: The client wanted to future-proof their data platform for ML/AI capabilities. Serving as architect and Qlik/Fabric SME alongside Atea NO, I am designing the migration of the ETL layer for their P&L solution (~15 data sources) from Qlik into Microsoft Fabric. A pilot Power BI app is being built in parallel to validate the new platform for end users.

      - title: Löfbergs Coffee
        date: 2026
        authors:
          - Microsoft Fabric
          - dlt
          - SQLMesh
          - Power BI
        summary: A multi-country coffee company facing QlikView end-of-life needed a full platform migration. Leading the architecture and development in a team of six, I am migrating ~20 QlikView apps spanning finance, operations, and sales into Microsoft Fabric with Power BI. The new platform enables self-service analytics and opens the door for ML/AI capabilities.

      - title: Jaktia
        date: 2025
        authors:
          - Microsoft Fabric
          - dlt
          - SQLMesh
        summary: A retail company with a brand-new ERP (Omnium) had no analytics whatsoever. In a team of three, I designed and built the data platform from the ground up — ingestion, historization, and a self-service consumption layer. Delivered a working foundation before the project was paused by the client to complete their ERP migration first.

      - title: Arctic Paper
        date: 2025
        authors:
          - Qlik Sense
          - dlt
        summary: HR lacked visibility into workforce skills across the organization. Solo, I built a talent analytics solution integrating Visma HR, JDE, Maximo, and a homegrown talent system into Qlik. The solution maps skills, grades, and credential expirations across departments — enabling HR to spot skill gaps and plan hiring and training. Used by hundreds of employees across the organization.

      - title: Avarn Security — Maintenance
        date: 2025
        authors:
          - Qlik Sense
          - QlikView
        summary: Maintenace of existing solution, both front- and back-end.

      - title: Volvohandlarförening
        date: 2025
        authors:
          - Azure SQL
          - Azure Data Factory
          - dlt
        summary: An existing Azure-based data warehouse suffered from poorly built Data Factory pipelines and slow stored procedures. I introduced dlt to replace brittle unnesting logic and refactored key stored procedures, cutting execution time from ~10 hours to ~10 minutes. The platform serves ~140 users across 7 dealerships with sales, invoicing, and HR analytics.

      - title: Swedish Government Agency
        date: 2024
        authors:
          - Qlik Sense
        summary: The agency needed to move complex budget allocation logic out of the niche tool Planacy into a more maintainable Qlik platform. In a team of three, I rebuilt the allocation logic in Qlik and — as a side effect — documented the entire budgeting process as a Mermaid flowchart, giving the agency their first visual representation of the logic. The reaction was unanimous: "why didn't we do this before?"

      - title: Life Science Corporation
        date: 2024
        authors:
          - Qlik Sense
        summary: A LIMS upgrade removed the reporting capabilities the organization depended on. In a team of two, I built a new data model in Qlik that replicated and improved on the old reports — replacing static Excel exports with dynamic, explorable dashboards. Approximately 100 users gained back their insights within a couple of months.

      - title: Sveriges Kommuner & Regioner
        date: 2024
        authors:
          - QlikView
        summary: QlikView developer and system administrator. Developed solutions for comprehensive call statistics analytics.

      - title: Vinnova – Sweden's Innovation Agency
        date: 2023
        authors:
          - Qlik Sense
        summary: My first consulting engagement. Vinnova had a mature Qlik Sense environment that needed more horsepower — new reports, refactored data models, and a platform upgrade driven by aging Windows servers. In a team of five, I built data compilation solutions for annual finance reporting delivered to regulatory authorities, where each year brings a new set of measures. Also led the Qlik Sense version upgrade across the environment.

      - title: Internationella Engelska Skolan
        date: 2023
        authors:
          - QlikView
        summary: Provided expert QlikView maintenance and development support, ensuring system stability and performance.

    experience:
      - company: Enqore
        position: Analytics Consultant
        start_date: 2025
        end_date: present

      - company: Epical
        position: Analytics Consultant
        start_date: 2023
        end_date: 2025

      - company: Cytiva
        position: Various Roles
        start_date: 2010
        end_date: 2023
        highlights:
          - "Analyst & Process Development Planner (2021–2023) — Built the analytics platform for the planning department (production, distribution, material) from scratch in Qlik. Delivered KPI dashboards for ~25 users and leadership, enabling data-driven decisions where previously there was no visibility. Still in use."
          - "BI Support Specialist (2017–2021) — Built 'One Warehouse', a global Qlik app for inbound, outbound, and inventory management across warehouses in Sweden, the US, Japan, Hong Kong, and Singapore. Replaced a daily emailed spreadsheet with live analytics displayed on warehouse floor screens, becoming the most used app in Global Supply Chain. Drove weekly global meetings where each site reviewed their numbers. 500+ users, still in use."
          - "Logistics Specialist (2015–2017)"
          - "Deviation Handler (2015)"
          - "Warehouse Associate (2010–2015)"

design:
  theme: engineeringclassic

  page:
    size: a4
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.7in
    right_margin: 0.7in
    show_footer: true
    show_top_note: true

  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)

  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
      name: 30pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true

  links:
    underline: false
    show_external_link_icon: false

  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: international
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ''
      space_between_connections: 0.5cm

  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.3cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 1.2em
    space_between_text_based_entries: 0.3em
    show_time_spans_in:
      - experience

  entries:
    date_and_location_width: 4.15cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em

  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        URL
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        **Tech Stack:** AUTHORS
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
